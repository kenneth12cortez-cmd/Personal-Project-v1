<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Data Manager</title>
  <style>

    body {   
      font-family: Arial; 
      max-width: 800px; 
      margin: 40px auto; 
      background: linear-gradient(to bottom,  #e0f7e0, #ffffff); 
      background-repeat: no-repeat;      
      background-attachment: fixed;      
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;  
    
    }
    h1 {
      color: #333;
      margin-bottom: 60px;
    }
    .buttons {
      display:  flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .bigbt {
      width: 220px;
      height: 120px;
      font-size: 24px;
      font-weight: bold;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      transition: all 0.2s;
    }
    .bigbt:hover {
      background-color: #45a049;
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
    .big-btn:active {
      transform: translateY(2px);
    }

  </style>
</head>
<body>

  <h1>Student Data Manager</h1>



 <div class="buttons">
    <button class="bigbt" onclick="window.location.href='editor.html'">Editor</button>
    <button class="bigbt" onclick="window.location.href='profiles.html'">View Profiles</button>
  </div>

</body>
</html>
