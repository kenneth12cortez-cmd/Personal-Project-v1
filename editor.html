<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Data Entry</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 20px auto;
    background: linear-gradient(to bottom, #e0f7e0, #ffffff); 
    background-repeat: no-repeat;      
    background-attachment: fixed;      
    min-height: 100vh;                   
         
         }
    input, button { margin: 8px 0; padding: 8px; }
    ul { list-style: none; padding: 0; }
    li { background: #f0f0f0; margin: 8px 0; padding: 10px; border-radius: 4px; }

li {
  background: #f0f0f0;
  margin: 12px 0;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 4px;}
li strong {
  font-size: 1.15em;
  color: #006400; } 
.form-panel {
  background: #f8fff8;
  border: 1px solid #d0e8d0;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 30px;
}
.list-panel {
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 20px;
}
.back-btn {
  display: inline-block;
  padding: 10px 20px;
  background: white;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 6px;
  text-decoration: none;
  font-size: 16px;
}
.back-btn:hover {
  background: #f8f8f8;
  border-color: #aaa;
}
.controls {
  text-align: center;
  margin-top: 20px;
}
.controls button,
.controls a {
  margin: 0 10px;
}


  </style>
</head>
<body>

  <div class="form-panel">
  <h1>Personal Data Entry</h1>
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="age" placeholder="Age">
  <select id="sex">
    <option value="" disabled selected>sex</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
   </select>
  <input type="text" id="location" placeholder="Location (e.g. Quezon City)">
  <input type="text" id="grade" placeholder="Grade/Score">
  <button onclick="saveEntry()">Add Entry</button>
  </div>

  <div class="list-panel">
    <h2>List</h2>
    <ul id="list"></ul>
  </div>

  <div class="controls">
    <button onclick="clearAll()">Clear data</button>
    <a href="index.html" class="back-btn">Back to Home</a>
  </div>

  <script>
    window.onload = loadEntries;
     function saveEntry() {
      const name     = document.getElementById('name').value.trim();
      const age      = document.getElementById('age').value.trim();
      const sex   = document.getElementById('sex').value;
      const location = document.getElementById('location').value.trim();
      const grade    = document.getElementById('grade').value.trim();

      if (!name) {
      alert("Name");
      return;
      }


      let entries = JSON.parse(localStorage.getItem('studentEntries')) || [];
      entries.push({
        name,
        age:      age      || '-',
        sex:   sex   || '-',
        location: location || '-',
        grade:    grade    || '-',
        date:     new Date().toLocaleString()
         });
      localStorage.setItem('studentEntries', JSON.stringify(entries));
      loadEntries();
      document.getElementById('name').value     = '';
      document.getElementById('age').value      = '';
      document.getElementById('sex').value   = '';
      document.getElementById('location').value = '';
      document.getElementById('grade').value    = '';
    }

       function loadEntries() {
      const list = document.getElementById('list');
      list.innerHTML = '';
      const entries = JSON.parse(localStorage.getItem('studentEntries')) || [];

      entries.forEach(entry => {
        const li = document.createElement('li');
        li.innerHTML = `
          <strong>${entry.name}</strong><br>
          Age: ${entry.age} | sex: ${entry.sex} | Location: ${entry.location}<br>
          Grade/Score: ${entry.grade} (${entry.date})
        `;
       list.appendChild(li);
      });
    }

    function clearAll() {
      if (confirm("Delete everything?")) {
        localStorage.removeItem('studentEntries');
        loadEntries();
      }
    }
  </script>
